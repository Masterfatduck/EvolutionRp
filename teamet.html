<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teamet | Evolution RP</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="config.js"></script>
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #030712;
            --card: rgba(17, 24, 39, 0.4);
            --border: rgba(255, 255, 255, 0.06);
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; line-height: 1.6; }

        .page-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .page-bg::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(3, 7, 18, 0.3), rgba(3, 7, 18, 0.9) 90%); }
        .slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0; transition: opacity 1.2s ease-in-out; }
        .slide.active { opacity: 1; }

        header { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 1400px; display: flex; justify-content: space-between; align-items: center; padding: 16px 40px; background: rgba(3, 7, 18, 0.4); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 100px; z-index: 9999; }
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--text); font-weight: 800; font-size: 1.1rem; text-transform: uppercase; }
        .logo span { color: var(--primary); }
        nav ul { display: flex; list-style: none; gap: 32px; }
        nav ul li a { text-decoration: none; color: var(--text-dim); font-weight: 600; font-size: 0.85rem; text-transform: uppercase; }
        nav ul li a:hover, nav ul li a.active { color: var(--primary); }

        .content { padding: 180px 5% 100px; max-width: 1200px; margin: 0 auto; text-align: center; }
        .page-header h1 { font-size: 3.5rem; font-weight: 800; margin-bottom: 16px; }
        .page-header p { color: var(--text-dim); font-size: 1.25rem; margin-bottom: 80px; }

        .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 32px; justify-content: center; }
        .team-card { background: var(--card); border: 1px solid var(--border); padding: 40px; border-radius: 32px; backdrop-filter: blur(10px); transition: 0.3s; }
        .team-card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .avatar { width: 120px; height: 120px; border-radius: 50%; background: var(--primary); margin: 0 auto 24px; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: 800; color: white; border: 4px solid var(--border); }
        .team-card h3 { font-size: 1.5rem; margin-bottom: 8px; }
        .role { color: var(--primary); font-weight: 700; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; }

        footer { padding: 60px 5% 40px; border-top: 1px solid var(--border); margin-top: 80px; }
        .footer-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; color: var(--text-dim); font-size: 0.9rem; }
        
        .reveal { opacity: 0; transform: translateY(20px); transition: 0.6s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>
    <div class="page-bg">
        <div class="slide active" style="background-image: url('bg1.jpg')"></div>
        <div class="slide" style="background-image: url('bg2.jpg')"></div>
        <div class="slide" style="background-image: url('bg3.jpg')"></div>
        <div class="slide" style="background-image: url('bg4.jpg')"></div>
        <div class="slide" style="background-image: url('bg5.jpg')"></div>
        <div class="slide" style="background-image: url('bg6.jpg')"></div>
    </div>

    <header>
        <a href="index.html" class="logo">EVOLUTION<span>RP</span></a>
        <nav>
            <ul>
                <li><a href="index.html">Hjem</a></li>
                <li><a href="teamet.html" class="active">Teamet</a></li>
                <li><a href="regler.html">Regler</a></li>
                <li><a href="faq.html">FAQ</a></li>
                <li><a href="donation.html">Donation</a></li>
                <li><a href="ansøninger.html">Ansøgninger</a></li>
            </ul>
        </nav>
        <div class="header-actions">
            <a href="#" class="btn btn-primary btn-login" style="padding: 12px 28px; border-radius: 100px; text-decoration: none; color: white; background: var(--primary); font-weight: 700; font-size: 0.8rem; text-transform: uppercase;">Log ind</a>
        </div>
    </header>

    <main class="content">
        <div class="page-header reveal">
            <h1>Mød Teamet</h1>
            <p>De ansvarlige bag Evolution RP projektet.</p>
        </div>

        <div class="team-grid">
            <div class="team-card reveal">
                <div class="avatar">M</div>
                <h3>Masterfatduck</h3>
                <div class="role">Project Leder</div>
            </div>
            <div class="team-card reveal">
                <div class="avatar">P</div>
                <h3>Panda</h3>
                <div class="role">Project Leder</div>
            </div>
            <div class="team-card reveal">
                <div class="avatar">A</div>
                <h3>Ak</h3>
                <div class="role">Project Leder</div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div>&copy; 2026 Evolution RP. Powered by <a href="https://discord.gg/Ee6CkAtrYM" target="_blank" style="color:var(--primary); text-decoration:none;"><strong>Suko Shop</strong></a>.</div>
            <div style="display: flex; gap: 24px;">
                <a href="index.html" style="color: var(--text-dim); text-decoration: none;">Hjem</a>
                <a href="regler.html" style="color: var(--text-dim); text-decoration: none;">Regler</a>
                <a href="faq.html" style="color: var(--text-dim); text-decoration: none;">FAQ</a>
            </div>
        </div>
    </footer>

    <script>
        // Slideshow og reveal kører via config.js
        window.addEventListener('DOMContentLoaded', () => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
            }, { threshold: 0.1 });
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        });
    </script>
</body>
</html>
